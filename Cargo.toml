[workspace]
resolver = "2"
members = ["kernel", "boot/*", "libs/*"]

[workspace.package]
version = "0.0.0"
authors = ["Seiya Nuta <nuta@seiya.me>"]
edition = "2021"

[workspace.dependencies]
arrayvec = { version = "0.7.4", default-features = false }
hashbrown = "0.14.3"
spin = "0.9.8"
ftl_types = { path = "./libs/ftl_types" }
ftl_utils = { path = "./libs/ftl_utils" }
ftl_kernel = { path = "./kernel" }
ftl_bump_allocator = { path = "./libs/bump_allocator" }
